    <!-- MAIN SCRIPT (Darf beim Generieren nicht gelöscht werden) -->
    <script id="main-script" type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [entrySearch, setEntrySearch] = useState('');
          const [showAddModal, setShowAddModal] = useState(false);
          
          // Liest die Mitglieder zu Beginn aus
          const initialMembers = useMemo(() => {
              try {
                  const text = document.getElementById('hauskreis-members').textContent;
                  return JSON.parse(text);
              } catch (e) {
                  return ["Al Ex", "Andreas Nickel", "Daniel Frank", "Eduard Günter", "Peter Eckert"];
              }
          }, []);
          const [members, setMembers] = useState(initialMembers);

          // Liest die Daten zu Beginn aus dem HTML Tag aus
          const initialData = useMemo(() => {
              try {
                  const text = document.getElementById('hauskreis-data').textContent;
                  return JSON.parse(text);
              } catch (e) {
                  console.error("Konnte Daten nicht laden:", e);
                  return [];
              }
          }, []);

          const dedupeAndSortData = (entries) => {
              const dataByKey = new Map();
              (entries || []).forEach((item) => {
                  if (!item || !item.datum) return;
                  const normalized = {
                      datum: item.datum,
                      status: item.status || 'Stattgefunden',
                      gastgeber: item.gastgeber ?? '?',
                      ort: item.ort ?? '?',
                      anmerkungen: item.anmerkungen || ''
                  };
                  const key = `${normalized.datum}||${normalized.status}||${normalized.gastgeber}||${normalized.ort}||${normalized.anmerkungen}`;
                  dataByKey.set(key, normalized);
              });
              return Array.from(dataByKey.values()).sort((a, b) => a.datum.localeCompare(b.datum));
          };
          const getEntryKey = (item) => {
              if (!item) return '';
              return `${item.datum || ''}||${item.status || ''}||${item.gastgeber || ''}||${item.ort || ''}||${item.anmerkungen || ''}`;
          };
          const getLastDate = (entries) => {
              if (!entries || entries.length === 0) return '';
              return entries[entries.length - 1].datum || '';
          };

          const [appData, setAppData] = useState(() => dedupeAndSortData(initialData));

          // Versuche Daten aus dem lokalen Browser-Speicher wiederherzustellen
          useEffect(() => {
              const baseData = dedupeAndSortData(initialData);
              let nextData = baseData;
              const savedData = localStorage.getItem('hauskreis_app_data');
              if (savedData) {
                  try {
                      const parsed = JSON.parse(savedData);
                      const saved = dedupeAndSortData(parsed);
                      const baseLastDate = getLastDate(baseData);
                      const savedLastDate = getLastDate(saved);
                      const savedIsNewer = savedLastDate > baseLastDate;
                      const savedHasMoreRows = saved.length > baseData.length;
                      if (savedIsNewer || savedHasMoreRows || baseData.length === 0) {
                          nextData = saved;
                      }
                  } catch (e) {}
              }
              setAppData(nextData);
              localStorage.setItem('hauskreis_app_data', JSON.stringify(nextData));

              const savedMembers = localStorage.getItem('hauskreis_app_members');
              if (savedMembers) {
                  try {
                      const parsedMembers = JSON.parse(savedMembers)
                          .map(name => (name || '').trim())
                          .filter(Boolean);
                      const cleanMembers = Array.from(new Set(parsedMembers)).sort();
                      if (cleanMembers.length > 0) {
                          setMembers(cleanMembers);
                          localStorage.setItem('hauskreis_app_members', JSON.stringify(cleanMembers));
                      }
                  } catch (e) {}
              }
          }, [initialData, initialMembers]);

          // Datums-Filter
          const allDates = useMemo(() => appData.map(d => d.datum).sort(), [appData]);
          const [startDate, setStartDate] = useState('');
          const [endDate, setEndDate] = useState('');
          const [isAutoDateRange, setIsAutoDateRange] = useState(true);

          useEffect(() => {
              if (allDates.length === 0) {
                  if (startDate || endDate) {
                      setStartDate('');
                      setEndDate('');
                  }
                  return;
              }
              if (isAutoDateRange || !startDate || !endDate) {
                  setStartDate(allDates[0]);
                  setEndDate(allDates[allDates.length - 1]);
              }
          }, [allDates, isAutoDateRange, startDate, endDate]);

          const normalizeName = (name) => {
            if (!name) return "";
            return name.trim();
          };

          const dataInDateRange = useMemo(() => {
              return appData.filter(item => item.datum >= startDate && item.datum <= endDate);
          }, [startDate, endDate, appData]);

          const filteredEntries = useMemo(() => {
              const q = entrySearch.trim().toLowerCase();
              const source = appData.map(item => ({ ...item, __key: getEntryKey(item) }));
              const filtered = q
                  ? source.filter(item => {
                      const haystack = `${item.datum} ${item.status} ${item.gastgeber} ${item.ort} ${item.anmerkungen}`.toLowerCase();
                      return haystack.includes(q);
                  })
                  : source;
              return filtered.sort((a, b) => b.datum.localeCompare(a.datum));
          }, [appData, entrySearch]);

          const stats = useMemo(() => {
            let total = dataInDateRange.length;
            let stattgefunden = 0;
            let ausgefallen = 0;
            let geburtstage = 0;
            
            const hosts = {};
            const attendance = {};
            const years = {};
            
            const allNamesSet = new Set(members);
            const timelineEvents = [];

            dataInDateRange.forEach(item => {
              if (item.status === 'Stattgefunden') stattgefunden++;
              if (item.status === 'Ausgefallen') ausgefallen++;
              if (item.status === 'Geburtstag') geburtstage++;

              const year = item.datum.substring(0, 4);
              if (!years[year]) years[year] = 0;
              if (item.status !== 'Ausgefallen') years[year]++;

              let parsedHosts = [];
              if (item.status !== 'Ausgefallen' && item.gastgeber && item.gastgeber !== '-' && item.gastgeber !== '?') {
                const splitHosts = item.gastgeber.split(' / ');
                splitHosts.forEach(h => {
                    const hClean = normalizeName(h);
                    if (hClean !== 'Restaurant') {
                        if (!hosts[hClean]) hosts[hClean] = 0;
                        hosts[hClean]++;
                        parsedHosts.push(hClean);
                        allNamesSet.add(hClean);
                    }
                });
              }

              let parsedAttendees = [];
              if (item.anmerkungen && item.anmerkungen.includes('Dabei:')) {
                  const dabeiStr = item.anmerkungen.split('Dabei:')[1];
                  if (dabeiStr) {
                      const people = dabeiStr.split(',').map(p => normalizeName(p)).filter(p => p);
                      people.forEach(pClean => {
                          if (!attendance[pClean]) attendance[pClean] = 0;
                          attendance[pClean]++;
                          parsedAttendees.push(pClean);
                          allNamesSet.add(pClean);
                      });
                  }
              }

              timelineEvents.push({ ...item, parsedHosts, parsedAttendees });
            });

            const sortedHosts = Object.entries(hosts).sort((a, b) => b[1] - a[1]);
            const sortedAttendance = Object.entries(attendance).sort((a, b) => b[1] - a[1]);
            const sortedYears = Object.entries(years).sort((a, b) => a[0].localeCompare(b[0]));
            const matrixNames = Array.from(allNamesSet).filter(n => n !== 'Restaurant').sort();

            return { total, stattgefunden, ausgefallen, geburtstage, sortedHosts, sortedAttendance, sortedYears, timelineEvents, matrixNames };
          }, [dataInDateRange, members]);

          // CSV Export Funktion
          const exportCSV = () => {
              const headers = ["Datum", "Status", "Gastgeber", "Ort", "Anmerkungen"];
              const rows = appData.map(item => [
                  item.datum,
                  item.status,
                  item.gastgeber,
                  item.ort,
                  `"${(item.anmerkungen || '').replace(/"/g, '""')}"`
              ]);
              const csvContent = [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
              
              const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `hauskreis_export_${new Date().toISOString().substring(0, 10)}.csv`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
          };

          // ECHTES SPEICHERN ALS NEUE HTML DATEI Oder überschreiben
          const saveHTMLFile = async () => {
              // 1. Gesamte Webseite kopieren
              const clone = document.documentElement.cloneNode(true);
              
              // 2. Leere den React Container aus
              const rootNode = clone.querySelector('#root');
              if (rootNode) rootNode.innerHTML = '';
              
              // 3. Lösche alle Injected-Styles
              const styles = clone.querySelectorAll('style');
              styles.forEach(s => {
                  if (s.id !== 'custom-styles') s.remove();
              });
              
              // 4. Lösche temporäre Skripte
              const scripts = clone.querySelectorAll('script');
              scripts.forEach(s => {
                  const isSrc = s.hasAttribute('src');
                  const isMain = s.id === 'main-script';
                  const isData = s.id === 'hauskreis-data';
                  const isMembers = s.id === 'hauskreis-members';
                  if (!isSrc && !isMain && !isData && !isMembers) {
                      s.remove();
                  }
              });

              // 5. Füge die NEUEN Daten in den Daten-Block ein
              const dataBlock = clone.querySelector('#hauskreis-data');
              if (dataBlock) {
                  dataBlock.textContent = "\n" + JSON.stringify(appData, null, 2) + "\n";
              }
              const memberBlock = clone.querySelector('#hauskreis-members');
              if (memberBlock) {
                  memberBlock.textContent = "\n" + JSON.stringify(members, null, 2) + "\n";
              }

              // 6. Setze das HTML zusammen
              const finalHtml = "<!DOCTYPE html>\n" + clone.outerHTML;

              // 7. Versuche auf Desktop die Datei direkt zu überschreiben
              if (window.showSaveFilePicker) {
                  try {
                      const fileHandle = await window.showSaveFilePicker({
                          suggestedName: 'hauskreis.html',
                          types: [{
                              description: 'HTML Dokument',
                              accept: { 'text/html': ['.html'] },
                          }],
                      });
                      const writable = await fileHandle.createWritable();
                      await writable.write(finalHtml);
                      await writable.close();
                      alert("Erfolgreich gespeichert! Die Datei wurde direkt überschrieben.");
                      return; // Abbruch hier, da erfolgreich!
                  } catch (err) {
                      // Wenn der User abbricht, machen wir nichts. Ansonsten Fallback.
                      if (err.name === 'AbortError') return;
                  }
              }

              // 8. Fallback für Safari & iPhone (Neuer Download)
              const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `hauskreis.html`; 
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              
              alert("Hinweis für Safari/iPhone:\n\nDer Browser hat soeben eine Kopie heruntergeladen. Das Überschreiben alter Dateien erlaubt Apple leider nicht automatisch.\n\nTausche die alte Datei in Telegram einfach gegen diese Neue aus!");
          };

          // Hinzufügen-Formular
          const AddModal = () => {
              const [newDate, setNewDate] = useState(new Date().toISOString().substring(0, 10));
              const [newStatus, setNewStatus] = useState('Stattgefunden');
              const [newHost, setNewHost] = useState('');
              const [newNotes, setNewNotes] = useState('');
              const [newDabei, setNewDabei] = useState([]);

              const toggleDabei = (name) => {
                  setNewDabei(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
              };

              const doAdd = () => {
                  let finalAnmerkungen = newNotes;
                  if (newStatus !== 'Ausgefallen' && newDabei.length > 0) {
                      finalAnmerkungen += (finalAnmerkungen ? " | " : "") + "Dabei: " + newDabei.join(", ");
                  }
                  
                  const newItem = {
                      datum: newDate,
                      status: newStatus,
                      gastgeber: newStatus === 'Ausgefallen' ? '-' : (newHost || '?'),
                      ort: newStatus === 'Ausgefallen' ? '-' : (newHost ? `Bei ${newHost}` : '?'),
                      anmerkungen: finalAnmerkungen
                  };
                  
                  setAppData(prev => {
                      const sorted = dedupeAndSortData([...prev, newItem]);
                      localStorage.setItem('hauskreis_app_data', JSON.stringify(sorted));
                      return sorted;
                  });
                  setStartDate(prev => (!prev || newDate < prev ? newDate : prev));
                  setEndDate(prev => (!prev || newDate > prev ? newDate : prev));
                  
                  setShowAddModal(false);
              };

              return (
                  <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in duration-300">
                          <div className="p-4 border-b bg-indigo-50 flex justify-between items-center">
                              <h3 className="font-bold text-lg text-indigo-900">Neuen Termin eintragen</h3>
                              <button onClick={() => setShowAddModal(false)} className="text-indigo-400 hover:text-indigo-700 transition">
                                  <i className="fa-solid fa-xmark text-xl"></i>
                              </button>
                          </div>

          const resetLocalDataToFile = () => {
              const baseData = dedupeAndSortData(initialData);
              const baseMembers = Array.from(new Set(initialMembers)).sort();
              localStorage.setItem('hauskreis_app_data', JSON.stringify(baseData));
              localStorage.setItem('hauskreis_app_members', JSON.stringify(baseMembers));

          const deleteEntry = (entry) => {
              if (!entry) return;
              const label = `${entry.datum} (${entry.status})`;
              if (!window.confirm(`Diesen Termin wirklich löschen?\n\n${label}`)) return;
              setAppData(prev => {
                  const idx = prev.findIndex(item => getEntryKey(item) === entry.__key);
                  if (idx === -1) return prev;
                  const updated = [...prev.slice(0, idx), ...prev.slice(idx + 1)];
                  localStorage.setItem('hauskreis_app_data', JSON.stringify(updated));
                  return updated;
              });
          };

          const BarChartItem = ({ label, value, max, colorClass }) => {
              const percentage = Math.max((value / max) * 100, 2);
              return (
                  <div className="mb-4">
                      <div className="flex justify-between mb-1 text-sm font-medium text-gray-700">
                          <span>{label}</span>
                          <span>{value}x</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-3">
                          <div className={`h-3 rounded-full ${colorClass}`} style={{ width: `${percentage}%` }}></div>
                      </div>
                  </div>
              );
          };

          const LineChart = ({ data }) => {
              if (!data || data.length === 0) return <div className="text-gray-500 text-sm py-4">Für diesen Zeitraum liegen keine Jahresdaten vor.</div>;
              const svgWidth = 800; const svgHeight = 250; const paddingX = 60; const paddingY = 40;
              const minCount = 0; const maxCount = Math.max(...data.map(d => d[1]), 10) + 5; 
              const points = data.map((d, i) => {
                const x = paddingX + (i * (svgWidth - 2 * paddingX)) / Math.max(data.length - 1, 1);
                const y = svgHeight - paddingY - ((d[1] - minCount) / (maxCount - minCount)) * (svgHeight - 2 * paddingY);
                return { x, y, value: d[1], label: d[0] };
              });
              const pathData = `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;

              return (
                <div className="w-full overflow-x-auto bg-gray-50 rounded-xl border border-gray-100 mt-4">
                  <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-auto min-w-[500px]">
                     <line x1={paddingX} y1={svgHeight - paddingY} x2={svgWidth - paddingX} y2={svgHeight - paddingY} stroke="#e5e7eb" strokeWidth="2" />
                     <line x1={paddingX} y1={paddingY} x2={svgWidth - paddingX} y2={paddingY} stroke="#f3f4f6" strokeWidth="1" />
                     {data.length > 1 && <path d={pathData} fill="none" stroke="#4f46e5" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />}
                     {points.map((p, i) => (
                        <g key={i}>
                           <circle cx={p.x} cy={p.y} r="6" fill="#ffffff" stroke="#4f46e5" strokeWidth="3" />
                           <text x={p.x} y={p.y - 15} textAnchor="middle" fontSize="16" fontWeight="bold" fill="#4f46e5">{p.value}x</text>
                           <text x={p.x} y={svgHeight - 15} textAnchor="middle" fontSize="14" fontWeight="600" fill="#6b7280">{p.label}</text>
                        </g>
                     ))}
                  </svg>
                </div>
              );
          };

          return (
            <div className="min-h-screen font-sans pb-10">
              {showAddModal && <AddModal />}

                        <i className="fa-solid fa-border-all text-lg"></i><span className="hidden md:inline">Dashboard</span>

                      <button onClick={() => setActiveTab('matrix')} className={`px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-2 ${activeTab === 'matrix' ? 'bg-indigo-800 text-white' : 'text-indigo-200 hover:bg-indigo-600 hover:text-white'}`}>
                        <i className="fa-solid fa-table text-lg"></i><span className="hidden md:inline">Matrix</span>
                      </button>
                      <button onClick={() => setActiveTab('settings')} className={`px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center space-x-2 ${activeTab === 'settings' ? 'bg-indigo-800 text-white' : 'text-indigo-200 hover:bg-indigo-600 hover:text-white'}`}>

                      <button onClick={saveHTMLFile} title="Speichere Änderungen als neue HTML-Datei ab!" className="bg-orange-500 text-white px-3 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-orange-600 transition flex items-center space-x-2 ml-2 relative group">
                        <i className="fa-solid fa-download"></i>
                        <span className="hidden sm:inline">Speichern</span>
                        <span className="absolute -bottom-8 left-1/2 transform -translate-x-1/2 w-max bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition">Datei überschreiben / sichern</span>
                      </button>

                          <span>Zeitraum eingrenzen:</span>

                              <input type="date" value={startDate} onChange={e => { setIsAutoDateRange(false); setStartDate(e.target.value); }} className="border border-gray-300 rounded-md px-3 py-1.5 outline-none text-gray-700 bg-gray-50" />

                          <div className="flex items-center space-x-2">
                              <label className="text-gray-500 font-medium">Bis:</label>
                              <input type="date" value={endDate} onChange={e => { setIsAutoDateRange(false); setEndDate(e.target.value); }} className="border border-gray-300 rounded-md px-3 py-1.5 outline-none text-gray-700 bg-gray-50" />

                          <button onClick={() => setIsAutoDateRange(true)} className="text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-3 py-1.5 rounded-md font-semibold transition">
                              Gesamter Zeitraum
                          </button>
                      </div>
                      <div className="ml-auto flex items-center space-x-2 text-indigo-800 bg-indigo-50 px-3 py-1 rounded-full font-bold text-xs">
                          <i className="fa-solid fa-database"></i>
                          <span>{appData.length} Termine geladen</span>
                      </div>
                  </div>
              </div>

              <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                
                {/* TAB: DASHBOARD */}
                {activeTab === 'dashboard' && (
                    <div className="space-y-8 duration-500">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex items-center space-x-4">
                                <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><i className="fa-regular fa-calendar text-2xl"></i></div>
                                <div><p className="text-sm font-medium text-gray-500">Gesamt geplant</p><p className="text-2xl font-bold text-gray-900">{stats.total}</p></div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex items-center space-x-4">
                                <div className="p-3 bg-green-100 text-green-600 rounded-lg"><i className="fa-solid fa-user-check text-2xl"></i></div>
                                <div><p className="text-sm font-medium text-gray-500">Stattgefunden</p><p className="text-2xl font-bold text-gray-900">{stats.stattgefunden}</p></div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex items-center space-x-4">
                                <div className="p-3 bg-red-100 text-red-600 rounded-lg"><i className="fa-regular fa-circle-xmark text-2xl"></i></div>
                                <div><p className="text-sm font-medium text-gray-500">Ausgefallen</p><p className="text-2xl font-bold text-gray-900">{stats.ausgefallen}</p></div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex items-center space-x-4">
                                <div className="p-3 bg-purple-100 text-purple-600 rounded-lg"><i className="fa-solid fa-cake-candles text-2xl"></i></div>
                                <div><p className="text-sm font-medium text-gray-500">Geburtstage</p><p className="text-2xl font-bold text-gray-900">{stats.geburtstage}</p></div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <div className="flex items-center space-x-2 mb-6 border-b pb-3">

                                </div>
                                <div>
                                    {stats.sortedAttendance.map(([name, count], idx) => (
                                        <BarChartItem key={name} label={`${idx + 1}. ${name}`} value={count} max={stats.sortedAttendance[0][1]} colorClass="bg-green-500" />
                                    ))}

                                <div className="flex items-center space-x-2 mb-6 border-b pb-3">

                                </div>
                                <div>
                                    {stats.sortedHosts.map(([name, count], idx) => (
                                        <BarChartItem key={name} label={`${idx + 1}. ${name}`} value={count} max={stats.sortedHosts[0][1]} colorClass="bg-indigo-500" />
                                    ))}
                                    {stats.sortedHosts.length === 0 && <div className="text-gray-400 text-sm">Keine Daten.</div>}
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                            <div className="flex items-center space-x-2 mb-2">
                                <i className="fa-solid fa-chart-pie text-blue-500 text-2xl"></i><h2 className="text-lg font-bold text-gray-800">Treffen pro Jahr im Zeitraum</h2>
                            </div>
                            <LineChart data={stats.sortedYears} />

                    </div>

                {/* TAB: MATRIX */}
                {activeTab === 'matrix' && (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden duration-500">
                        <div className="p-4 border-b border-gray-200 bg-gray-50 flex items-center space-x-2">
                            <i className="fa-solid fa-table text-indigo-600 text-xl"></i><h2 className="text-lg font-bold text-gray-800">Teilnehmer-Matrix ({stats.timelineEvents.length} Termine)</h2>
                        </div>
                        <div className="p-4 bg-white border-b border-gray-100 flex gap-4 text-sm text-gray-600 flex-wrap">
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 bg-green-100 border border-green-200 rounded"></div> <span>Dabei gewesen</span></div>
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 bg-indigo-200 border border-indigo-400 rounded"></div> <b>Gastgeber (🏠)</b></div>
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 bg-red-50 border border-red-200 rounded"></div> <span className="text-red-500 font-medium">Ausgefallen</span></div>
                        </div>
                        
                        <div className="overflow-x-auto pb-4 custom-scrollbar">
                            <table className="min-w-full divide-y divide-gray-200 border-collapse">
                                <thead>
                                    <tr>
                                        <th className="sticky left-0 z-20 bg-gray-100 p-4 text-left text-xs font-bold text-gray-600 uppercase tracking-wider shadow-[1px_0_0_0_#e5e7eb]">Datum &rarr;</th>
                                        {stats.timelineEvents.map((ev, i) => (
                                            <th key={i} className={`px-3 py-4 text-center text-xs font-semibold text-gray-600 border-l border-gray-200 min-w-[110px] transition-colors ${ev.status === 'Ausgefallen' ? 'bg-red-50 hover:bg-red-100' : 'bg-gray-50 hover:bg-gray-100'}`}>
                                                <div className="flex flex-col items-center">
                                                    <span className={ev.status === 'Ausgefallen' ? 'text-red-500 line-through' : ''}>{ev.datum.substring(5, 10).replace('-', '.')}</span>
                                                    <span className="text-[10px] text-gray-400 font-normal">{ev.datum.substring(0, 4)}</span>
                                                    {ev.status === 'Geburtstag' && <i className="fa-solid fa-cake-candles text-xl text-purple-500 mt-1" title="Geburtstag"></i>}
                                                    {ev.status === 'Ausgefallen' && <span className="text-[10px] text-red-500 font-bold mt-1 uppercase tracking-wider">Ausfall</span>}
                                                </div>
                                            </th>
                                        ))}
                                        {stats.timelineEvents.length === 0 && <th className="px-6 py-4 text-gray-400 font-normal w-full text-left">Keine Termine im Zeitraum.</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {stats.matrixNames.map((name) => (
                                        <tr key={name} className="hover:bg-indigo-50/30 transition-colors group">
                                            <td className="sticky left-0 z-10 bg-white p-4 text-sm font-bold text-gray-800 shadow-[1px_0_0_0_#e5e7eb] group-hover:bg-gray-50">{name}</td>
                                            {stats.timelineEvents.map((ev, i) => {
                                                const isHost = ev.parsedHosts.includes(name);
                                                const isPresent = ev.parsedAttendees.includes(name) || isHost; 
                                                return (
                                                    <td key={i} className={`p-2 border-l border-gray-100 text-center ${ev.status === 'Ausgefallen' ? 'bg-red-50/30' : ''}`}>
                                                        {ev.status === 'Ausgefallen' ? (
                                                            <div className="text-red-200 font-light text-xs">-</div>
                                                        ) : isPresent ? (
                                                            <div className={`py-2 px-1 mx-auto rounded-lg text-xs flex flex-col items-center justify-center transition-all ${isHost ? 'bg-indigo-200 text-indigo-900 font-extrabold border-2 border-indigo-400 shadow-sm scale-105 z-10 relative' : 'bg-green-100 text-green-800 border border-green-200'}`}>
                                                                <span>{name.split(' ')[0]}</span> 
                                                                {isHost && <span className="text-[10px] mt-0.5 tracking-tighter uppercase">Gastgeber</span>}
                                                            </div>
                                                        ) : (
                                                            <div className="text-gray-300 font-light text-xs">-</div>
                                                        )}
                                                    </td>

                                            {stats.timelineEvents.length === 0 && <td></td>}

                                    ))}

                            </table>
                        </div>
                    </div>
                )}

                {/* TAB: EINSTELLUNGEN */}
                {activeTab === 'settings' && (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden duration-500 p-6">

                            <h2 className="text-xl font-bold text-gray-800 flex items-center space-x-2">
                                <i className="fa-solid fa-gear text-indigo-600"></i>
                                <span>Einstellungen & Daten</span>
                            </h2>
                            <button onClick={exportCSV} className="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition flex items-center space-x-2 text-sm font-semibold shadow-sm">
                                <i className="fa-solid fa-file-csv"></i>
                                <span>Als CSV Exportieren</span>
                            </button>
                        </div>
                        
                        <div className="mb-6">
                            <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center space-x-2">
                                <i className="fa-solid fa-users text-indigo-500"></i>
                                <span>Personen verwalten</span>
                            </h3>
                            <div className="mb-4">
                                <button
                                    onClick={resetLocalDataToFile}
                                    className="bg-amber-100 text-amber-900 border border-amber-300 hover:bg-amber-200 px-4 py-2 rounded-lg transition text-sm font-semibold"
                                >
                                    Lokale Browserdaten auf Datei-Stand zurücksetzen
                                </button>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:items-center space-y-3 sm:space-y-0 sm:space-x-3 mb-6">
                                <input 
                                    type="text" 
                                    placeholder="Neuer Name..." 
                                    id="new-member-input"
                                    className="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none flex-grow max-w-sm"
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') {
                                            const val = e.target.value.trim();
                                            if (val && !members.includes(val)) {
                                                const updatedMembers = [...members, val].sort();
                                                setMembers(updatedMembers);
                                                localStorage.setItem('hauskreis_app_members', JSON.stringify(updatedMembers));
                                                e.target.value = '';
                                            }
                                        }
                                    }}
                                />
                                <button 
                                    onClick={() => {
                                        const input = document.getElementById('new-member-input');

                                            setMembers(updatedMembers);
                                            localStorage.setItem('hauskreis_app_members', JSON.stringify(updatedMembers));
                                            input.value = '';
                                        }
                                    }}
                                    className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition shadow-sm font-medium"
                                >
                                    <i className="fa-solid fa-plus mr-2"></i>Hinzufügen
                                </button>

                                                    const newName = prompt("Neuer Name für " + m + ":", m);

                                                        const cleanName = newName.trim();
                                                        
                                                        // 1. Aktualisiere Namens-Liste im Menü (falls er drin ist oder es ein neuer Ghost ist)

                                                            updatedMembers.push(cleanName);
                                                        }
                                                        updatedMembers = Array.from(new Set(updatedMembers)).sort();
                                                        setMembers(updatedMembers);
                                                        localStorage.setItem('hauskreis_app_members', JSON.stringify(updatedMembers));
                                                        
                                                        // 2. Aktualisiere historische Daten exakt
                                                        if (window.confirm(`Sollen alle bisherigen Einträge von "${m}" ebenfalls in "${cleanName}" umbenannt werden?`)) {
                                                            setAppData(prev => {
                                                                const updatedData = prev.map(item => {
                                                                    let updatedHost = item.gastgeber;
                                                                    if (updatedHost && updatedHost !== '-' && updatedHost !== '?') {
                                                                        // Splitten, genau matchen und wieder zusammensetzen
                                                                        updatedHost = updatedHost.split('/').map(h => h.trim() === m ? cleanName : h.trim()).join(' / ');
                                                                    }
                                                                    
                                                                    let updatedAnmerkungen = item.anmerkungen;
                                                                    if (updatedAnmerkungen && updatedAnmerkungen.includes('Dabei:')) {
                                                                        const parts = updatedAnmerkungen.split('Dabei:');
                                                                        const textPart = parts[0];
                                                                        let attendees = parts[1].split(',').map(p => p.trim() === m ? cleanName : p.trim()).filter(p => p);
                                                                        attendees = Array.from(new Set(attendees)); // Duplikate löschen falls nötig
                                                                        updatedAnmerkungen = textPart + 'Dabei: ' + attendees.join(', ');
                                                                    }
                                                                    return { ...item, gastgeber: updatedHost, anmerkungen: updatedAnmerkungen };
                                                                });
                                                                localStorage.setItem('hauskreis_app_data', JSON.stringify(updatedData));
                                                                return updatedData;
                                                            });
                                                        }
                                                    }
                                                }}
                                                className="text-blue-600 hover:text-blue-800 bg-blue-100 hover:bg-blue-200 px-3 py-1.5 rounded-lg transition text-sm font-medium flex items-center space-x-1"
                                                title="Namen bearbeiten"
                                            >
                                                <i className="fa-solid fa-pen"></i><span>Bearbeiten</span>
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    if(window.confirm("Bist du sicher, dass du " + m + " aus der Liste entfernen möchtest?")) {
                                                        // 1. Aus Dropdown löschen
                                                        const updatedMembers = members.filter(old => old !== m);
                                                        setMembers(updatedMembers);
                                                        localStorage.setItem('hauskreis_app_members', JSON.stringify(updatedMembers));
                                                        
                                                        // 2. Historische Daten löschen
                                                        if (window.confirm(`Soll "${m}" auch aus allen alten Terminen (Gastgeber & Anwesenheit) herausgelöscht werden?`)) {
                                                            setAppData(prev => {
                                                                const updatedData = prev.map(item => {
                                                                    let updatedHost = item.gastgeber;
                                                                    if (updatedHost && updatedHost !== '-' && updatedHost !== '?') {
                                                                        updatedHost = updatedHost.split('/').map(h => h.trim()).filter(h => h !== m).join(' / ');
                                                                        if (!updatedHost) updatedHost = '?';
                                                                    }

                                                                    let updatedAnmerkungen = item.anmerkungen;
                                                                    if (updatedAnmerkungen && updatedAnmerkungen.includes('Dabei:')) {
                                                                        const parts = updatedAnmerkungen.split('Dabei:');
                                                                        const textPart = parts[0];
                                                                        let attendees = parts[1].split(',').map(p => p.trim()).filter(p => p !== m && p !== '');
                                                                        if (attendees.length > 0) {
                                                                            updatedAnmerkungen = textPart + 'Dabei: ' + attendees.join(', ');
                                                                        } else {
                                                                            updatedAnmerkungen = textPart.replace(/\|\s*$/, '').trim();
                                                                        }
                                                                    }
                                                                    return { ...item, gastgeber: updatedHost, anmerkungen: updatedAnmerkungen };
                                                                });
                                                                localStorage.setItem('hauskreis_app_data', JSON.stringify(updatedData));
                                                                return updatedData;
                                                            });
                                                        }
                                                    }
                                                }}
                                                className="text-red-600 hover:text-red-800 bg-red-100 hover:bg-red-200 px-3 py-1.5 rounded-lg transition text-sm font-medium flex items-center space-x-1"
                                                title="Person entfernen"
                                            >
                                                <i className="fa-solid fa-trash"></i><span>Löschen</span>
                                            </button>
                                        </div>
                                    </li>
                                ))}
                                {stats.matrixNames.length === 0 && (
                                    <li className="p-4 text-gray-500 text-center">Keine Personen angelegt.</li>
                                )}
                            </ul>
                        </div>

                        <div className="mt-10 pt-8 border-t border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center space-x-2">
                                <i className="fa-solid fa-calendar-xmark text-red-500"></i>
                                <span>Termine verwalten</span>
                            </h3>
                            <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-4">
                                <input
                                    type="text"
                                    value={entrySearch}
                                    onChange={e => setEntrySearch(e.target.value)}
                                    placeholder="Termin suchen (Datum, Status, Gastgeber, Ort, Anmerkung)..."
                                    className="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none flex-grow"
                                />
                                <div className="text-xs font-semibold text-indigo-700 bg-indigo-50 px-3 py-2 rounded-lg whitespace-nowrap">
                                    {filteredEntries.length} von {appData.length} Terminen
                                </div>
                            </div>

                            <ul className="divide-y divide-gray-100 border border-gray-200 rounded-xl bg-gray-50/50 max-h-[420px] overflow-y-auto custom-scrollbar">
                                {filteredEntries.map((entry) => (
                                    <li key={entry.__key} className="p-4 flex flex-col md:flex-row md:items-start md:justify-between gap-3 hover:bg-white transition">
                                        <div className="min-w-0">
                                            <div className="flex flex-wrap items-center gap-2 mb-2">
                                                <span className="text-sm font-bold text-gray-900">{entry.datum}</span>
                                                <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${
                                                    entry.status === 'Stattgefunden' ? 'bg-green-100 text-green-800' :
                                                    entry.status === 'Ausgefallen' ? 'bg-red-100 text-red-800' :
                                                    'bg-purple-100 text-purple-800'
                                                }`}>{entry.status}</span>
                                            </div>
                                            <div className="text-sm text-gray-700"><b>Gastgeber:</b> {entry.gastgeber || '-'}</div>
                                            <div className="text-sm text-gray-700"><b>Ort:</b> {entry.ort || '-'}</div>
                                            {entry.anmerkungen && <div className="text-sm text-gray-600 mt-1 break-words"><b>Anmerkung:</b> {entry.anmerkungen}</div>}
                                        </div>
                                        <div className="flex-shrink-0">
                                            <button
                                                onClick={() => deleteEntry(entry)}
                                                className="text-red-700 hover:text-red-900 bg-red-100 hover:bg-red-200 px-3 py-2 rounded-lg transition text-sm font-semibold flex items-center space-x-2"
                                                title="Termin löschen"
                                            >
                                                <i className="fa-solid fa-trash"></i><span>Löschen</span>
                                            </button>
                                        </div>
                                    </li>
                                ))}
                                {filteredEntries.length === 0 && (
                                    <li className="p-4 text-gray-500 text-center">Keine passenden Termine gefunden.</li>
                                )}
                            </ul>
                        </div>
                    </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
